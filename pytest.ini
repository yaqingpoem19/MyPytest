# pytest.ini pytest配置文件
[pytest]

# 测试文件匹配规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 默认参数，命令行选项
addopts =
    -v
    -s
    --tb=short
    --strict-markers
    --html=report/test_report.html
    --self-contained-html

# 自定义标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: API接口测试
    ui: UI界面测试
    e2e: 端到端测试
    skip_in_prod: 生产环境跳过