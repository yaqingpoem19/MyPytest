# config/config.ini
# 接口自动化测试配置文件

[ENV]
# 当前运行环境: dev, test, staging, production
CURRENT_ENV = test

[DEV]
BASE_URL = https://dev-api.example.com
REST_BASE_URL = https://dev-api.example.com/api/v1
SOAP_WSDL_URL = https://dev-ws.example.com/Service?wsdl
XMLRPC_URL = https://dev-xmlrpc.example.com/RPC2
JSONRPC_URL = https://dev-jsonrpc.example.com/api
TIMEOUT = 60
MAX_RETRIES = 3
LOG_LEVEL = DEBUG

[TEST]
BASE_URL = https://test-api.example.com
REST_BASE_URL = https://test-api.example.com/api/v1
SOAP_WSDL_URL = https://test-ws.example.com/Service?wsdl
XMLRPC_URL = https://test-xmlrpc.example.com/RPC2
JSONRPC_URL = https://test-jsonrpc.example.com/api
TIMEOUT = 30
MAX_RETRIES = 2
LOG_LEVEL = INFO

[STAGING]
BASE_URL = https://staging-api.example.com
REST_BASE_URL = https://staging-api.example.com/api/v1
SOAP_WSDL_URL = https://staging-ws.example.com/Service?wsdl
XMLRPC_URL = https://staging-xmlrpc.example.com/RPC2
JSONRPC_URL = https://staging-jsonrpc.example.com/api
TIMEOUT = 30
MAX_RETRIES = 3
LOG_LEVEL = INFO

[PRODUCTION]
BASE_URL = https://api.example.com
REST_BASE_URL = https://api.example.com/api/v1
SOAP_WSDL_URL = https://ws.example.com/Service?wsdl
XMLRPC_URL = https://xmlrpc.example.com/RPC2
JSONRPC_URL = https://jsonrpc.example.com/api
TIMEOUT = 10
MAX_RETRIES = 1
LOG_LEVEL = WARNING

[AUTH]
# 认证配置（可加密存储）
DEFAULT_AUTH_TYPE = bearer
TEST_USERNAME = testuser
TEST_PASSWORD = testpass123
API_KEY = your-api-key-here
BEARER_TOKEN = your-bearer-token-here

[DATABASE]
# 数据库配置
DB_HOST = localhost
DB_PORT = 3306
DB_USER = testuser
DB_PASSWORD = testpass
DB_NAME = testdb

[REPORT]
# 报告配置
REPORT_DIR = report
REPORT_NAME = test_report.html
ALLURE_RESULTS_DIR = allure-results

[LOG]
# 日志配置
LOG_DIR = log
LOG_FILE = test.log
LOG_ROTATION = 1 day
LOG_RETENTION = 7 days

[HEADERS]
# 默认请求头
USER_AGENT = Pytest-AutoTest/1.0
ACCEPT = application/json
ACCEPT_LANGUAGE = zh-CN,zh;q=0.9

[DATA]
# 测试数据文件路径
TEST_DATA_DIR = data
USER_DATA_FILE = user_data.xlsx
ORDER_DATA_FILE = order_data.xlsx

[PERFORMANCE]
# 性能测试配置
CONCURRENT_USERS = 10
RAMP_UP_TIME = 5
LOOP_COUNT = 100
THINK_TIME = 1